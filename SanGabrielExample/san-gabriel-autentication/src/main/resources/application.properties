spring.application.name=san-gabriel-autentication

# Ignorar archivos de metadatos de macOS (._*) en el classpath scan
spring.classformat.ignore=true

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/UsuariosDB
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=auth

# JWT - En produccion usar variables de entorno para el secret
jwt.secret=U2FuR2FicmllbEF1dGgkZUNyZXQyMDI2U2VjdXJlS2V5TXVzdEJlQXRMZWFzdDI1NkJpdHM=
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Seguridad - maximos intentos fallidos antes de bloquear la cuenta
security.max-intentos-fallidos=5
